<div class="flex-grow flex flex-col items-center py-12 px-4 w-full">
  <div class="max-w-4xl w-full flex flex-col items-center">
    <h1 class="text-4xl font-bold text-gray-900 mb-8">Mi perfil</h1>

    <div class="flex flex-col items-center mb-10">
      <div class="w-32 h-32 rounded-full bg-blue-600 flex items-center justify-center text-white text-5xl font-bold shadow-md mb-6">
        <svg class="w-20 h-20 fill-current opacity-80" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
      </div>
    </div>

    <p *ngIf="isLoadingProfile()" class="text-sm text-gray-600 font-medium mb-6">Cargando perfil...</p>

    <form class="flex flex-col space-y-6 w-full max-w-2xl mx-auto" (ngSubmit)="onSave()" #profileForm="ngForm">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="flex flex-col">
          <label class="text-sm font-semibold text-gray-700 mb-2">Nombres</label>
          <input type="text" name="firstName" [(ngModel)]="firstName" required maxlength="80" [disabled]="isFormDisabled" placeholder="Ej. Juan" [class.border-red-500]="submitted && !firstName.trim()" [class.border-gray-300]="!(submitted && !firstName.trim())" class="px-4 py-3 rounded-xl border focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800 disabled:opacity-60 disabled:cursor-not-allowed" />
        </div>
        <div class="flex flex-col">
          <label class="text-sm font-semibold text-gray-700 mb-2">Apellidos</label>
          <input type="text" name="lastName" [(ngModel)]="lastName" required maxlength="80" [disabled]="isFormDisabled" placeholder="Ej. Pérez García" [class.border-red-500]="submitted && !lastName.trim()" [class.border-gray-300]="!(submitted && !lastName.trim())" class="px-4 py-3 rounded-xl border focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800 disabled:opacity-60 disabled:cursor-not-allowed" />
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="flex flex-col">
          <label class="text-sm font-semibold text-gray-700 mb-2">DNI</label>
          <input type="text" name="dni" [ngModel]="dni" readonly placeholder="12345678" class="px-4 py-3 rounded-xl border border-gray-300 bg-gray-100 text-gray-700 cursor-not-allowed" />
        </div>
        <div class="flex flex-col">
          <label class="text-sm font-semibold text-gray-700 mb-2">Teléfono</label>
          <input type="tel" name="phone" [(ngModel)]="phone" required maxlength="9" inputmode="numeric" pattern="[0-9]{9}" [disabled]="isFormDisabled" placeholder="987654321" [class.border-red-500]="submitted && !/^\d{9}$/.test(phone.trim())" [class.border-gray-300]="!(submitted && !/^\d{9}$/.test(phone.trim()))" class="px-4 py-3 rounded-xl border focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800 disabled:opacity-60 disabled:cursor-not-allowed" />
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="flex flex-col">
          <label class="text-sm font-semibold text-gray-700 mb-2">Correo electrónico</label>
          <input type="email" name="email" [(ngModel)]="email" required email maxlength="120" [disabled]="isFormDisabled" placeholder="juan@correo.com" [class.border-red-500]="submitted && !email.trim()" [class.border-gray-300]="!(submitted && !email.trim())" class="px-4 py-3 rounded-xl border focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800 disabled:opacity-60 disabled:cursor-not-allowed" />
        </div>

        <div *ngIf="isCitizenProfile" class="flex flex-col">
          <label class="text-sm font-semibold text-gray-700 mb-2">Distrito / Provincia</label>
          <select name="districtId" [(ngModel)]="selectedDistrictId" required [disabled]="isFormDisabled" [class.border-red-500]="submitted && !selectedDistrictId" [class.border-gray-300]="!(submitted && !selectedDistrictId)" class="px-4 py-3 rounded-xl border focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800 appearance-none cursor-pointer disabled:opacity-60 disabled:cursor-not-allowed">
            <option [ngValue]="null">{{ isLoadingDistricts() ? "Cargando distritos..." : "Seleccionar distrito / provincia" }}</option>
            <option *ngFor="let district of districts" [ngValue]="district.id">
              {{ district.name }} - {{ district.province }}
            </option>
          </select>
        </div>

        <div *ngIf="usesMunicipalityProfile" class="flex flex-col">
          <label class="text-sm font-semibold text-gray-700 mb-2">Municipalidad</label>
          <select name="municipalityId" [(ngModel)]="selectedMunicipalityId" required [disabled]="isFormDisabled" [class.border-red-500]="submitted && !selectedMunicipalityId" [class.border-gray-300]="!(submitted && !selectedMunicipalityId)" class="px-4 py-3 rounded-xl border focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800 appearance-none cursor-pointer disabled:opacity-60 disabled:cursor-not-allowed">
            <option [ngValue]="null">{{ isLoadingMunicipalities() ? "Cargando municipalidades..." : "Seleccionar municipalidad" }}</option>
            <option *ngFor="let municipality of municipalities" [ngValue]="municipality.id">
              {{ municipality.name }}
            </option>
          </select>
        </div>
      </div>

      <div *ngIf="isCitizenProfile" class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-2">Dirección de domicilio</label>
        <input type="text" name="homeAddress" [(ngModel)]="homeAddress" required maxlength="180" [disabled]="isFormDisabled" placeholder="Ej. Av. Siempre Viva 123" [class.border-red-500]="submitted && !homeAddress.trim()" [class.border-gray-300]="!(submitted && !homeAddress.trim())" class="w-full px-4 py-3 rounded-xl border focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800 disabled:opacity-60 disabled:cursor-not-allowed" />
      </div>

      <ng-container *ngIf="usesMunicipalityProfile">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="flex flex-col">
            <label class="text-sm font-semibold text-gray-700 mb-2">Distrito / Provincia</label>
            <input type="text" name="municipalityDistrict" [ngModel]="selectedMunicipalityDistrictLabel" readonly placeholder="Seleccione una municipalidad" class="px-4 py-3 rounded-xl border border-gray-300 bg-gray-100 text-gray-700 cursor-not-allowed" />
          </div>
          <div *ngIf="isReceptionistProfile" class="flex flex-col">
            <label class="text-sm font-semibold text-gray-700 mb-2">Unidad municipal</label>
            <select name="municipalUnit" [(ngModel)]="selectedMunicipalUnit" required [disabled]="isFormDisabled" [class.border-red-500]="submitted && !selectedMunicipalUnit" [class.border-gray-300]="!(submitted && !selectedMunicipalUnit)" class="px-4 py-3 rounded-xl border focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800 appearance-none cursor-pointer disabled:opacity-60 disabled:cursor-not-allowed">
              <option [ngValue]="null">Seleccionar unidad municipal</option>
              <option *ngFor="let unit of municipalUnitOptions" [ngValue]="unit.value">
                {{ unit.label }}
              </option>
            </select>
          </div>
          <div *ngIf="isCleaningOperationsProfile" class="flex flex-col">
            <label class="text-sm font-semibold text-gray-700 mb-2">Turno</label>
            <select name="shift" [(ngModel)]="selectedShift" required [disabled]="isFormDisabled" [class.border-red-500]="submitted && !selectedShift" [class.border-gray-300]="!(submitted && !selectedShift)" class="px-4 py-3 rounded-xl border focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800 appearance-none cursor-pointer disabled:opacity-60 disabled:cursor-not-allowed">
              <option [ngValue]="null">Seleccionar turno</option>
              <option *ngFor="let shift of shiftOptions" [ngValue]="shift.value">
                {{ shift.label }}
              </option>
            </select>
          </div>
        </div>

        <div class="flex flex-col">
          <label class="text-sm font-semibold text-gray-700 mb-2">Código de trabajador</label>
          <input type="text" name="workerCode" [ngModel]="workerCode" readonly placeholder="Código de trabajador" class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-gray-100 text-gray-700 cursor-not-allowed" />
        </div>
      </ng-container>

      <p *ngIf="errorMessage()" class="text-sm text-red-600 font-medium">{{ errorMessage() }}</p>
      <p *ngIf="successMessage()" class="text-sm text-green-700 font-medium">{{ successMessage() }}</p>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-4">
        <button type="button" (click)="onBack()" [disabled]="isSaving()" class="w-full py-3 bg-gray-200 text-gray-900 font-bold rounded-xl hover:bg-gray-300 transition-colors shadow-md disabled:opacity-60 disabled:cursor-not-allowed">
          Volver
        </button>
        <button type="submit" [disabled]="isFormDisabled" class="w-full py-3 bg-gray-900 text-white font-bold rounded-xl hover:bg-gray-800 transition-colors shadow-md disabled:opacity-60 disabled:cursor-not-allowed">
          {{ isSaving() ? "Actualizando..." : "Actualizar información" }}
        </button>
      </div>
    </form>
  </div>
</div>
