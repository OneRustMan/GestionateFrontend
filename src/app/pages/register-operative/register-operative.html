<div class="flex flex-col w-full max-w-2xl mx-auto py-8">
  <h2 class="text-3xl font-bold text-gray-900 mb-8 text-center md:text-left">Crear cuenta de area operativa de limpieza municipal</h2>
  
  <form class="flex flex-col space-y-6 w-full" (ngSubmit)="onRegister()">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-2">Nombres</label>
        <input type="text" name="firstName" [(ngModel)]="firstName" maxlength="80" placeholder="Nombres Completos" class="px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800" />
      </div>
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-2">Apellidos</label>
        <input type="text" name="lastName" [(ngModel)]="lastName" maxlength="80" placeholder="Apellidos Completos" class="px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800" />
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-2">DNI</label>
        <input type="text" name="dni" [(ngModel)]="dni" maxlength="8" inputmode="numeric" pattern="[0-9]{8}" placeholder="Numero de DNI" class="px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800" />
      </div>
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-2">Teléfono</label>
        <input type="tel" name="phone" [(ngModel)]="phone" maxlength="9" inputmode="numeric" pattern="[0-9]{9}" placeholder="Numero de 9 digitos" class="px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800" />
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-2">Correo electrónico</label>
        <input type="email" name="email" [(ngModel)]="email" maxlength="120" placeholder="@correo.com" class="px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800" />
      </div>
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-2">Municipalidad</label>
        <select name="municipalityId" [(ngModel)]="selectedMunicipalityId" [disabled]="isLoadingMunicipalities()" class="px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800 appearance-none cursor-pointer disabled:opacity-60 disabled:cursor-not-allowed">
          <option [ngValue]="null">{{ isLoadingMunicipalities() ? "Cargando municipalidades..." : "Seleccionar municipalidad" }}</option>
          <option *ngFor="let municipality of municipalities" [ngValue]="municipality.id">
            {{ municipality.name }}
          </option>
        </select>
      </div>
    </div>

    <div *ngIf="selectedMunicipality" class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-2">Distrito / Provincia</label>
        <input type="text" [value]="selectedMunicipality.districtName + ' - ' + selectedMunicipality.province" class="px-4 py-3 rounded-xl border border-gray-300 bg-gray-100 text-gray-700" readonly />
      </div>
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-2">Municipalidad seleccionada</label>
        <input type="text" [value]="selectedMunicipality.name" class="px-4 py-3 rounded-xl border border-gray-300 bg-gray-100 text-gray-700" readonly />
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-2">Código de trabajador</label>
        <input type="text" name="workerCode" [(ngModel)]="workerCode" maxlength="30" placeholder="Codigo de identificacion" class="px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800" />
      </div>
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-2">Turno</label>
        <select name="shift" [(ngModel)]="shift" class="px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800 appearance-none cursor-pointer">
          <option [ngValue]="null">Turno de trabajo</option>
          <option *ngFor="let shiftOption of shifts" [ngValue]="shiftOption.value">
            {{ shiftOption.label }}
          </option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-2">Contraseña</label>
        <input type="password" name="password" [(ngModel)]="password" minlength="6" maxlength="80" placeholder="Contraseña segura" class="px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800" />
      </div>
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-2">Verificar contraseña</label>
        <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" minlength="6" maxlength="80" placeholder="Contraseña segura" class="px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800" />
      </div>
    </div>

    <p *ngIf="errorMessage()" class="text-sm text-red-600 font-medium">{{ errorMessage() }}</p>
    <p *ngIf="successMessage()" class="text-sm text-green-700 font-medium">{{ successMessage() }}</p>

    <button type="submit" [disabled]="isLoading() || isLoadingMunicipalities()" class="w-full py-3 bg-green-900 text-white font-bold rounded-xl hover:bg-green-800 transition-colors shadow-md mt-4 disabled:opacity-60 disabled:cursor-not-allowed">
      {{ isLoading() ? "Creando cuenta..." : "Crear cuenta" }}
    </button>

    <div class="text-center pt-4">
      <span class="text-gray-600">¿Ya tienes cuenta?</span>
      <a routerLink="/login" class="font-bold text-gray-900 hover:text-green-800 ml-1 transition-colors">Inicia sesión aquí</a>
    </div>
  </form>
</div>
