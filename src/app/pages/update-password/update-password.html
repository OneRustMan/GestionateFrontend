<div class="flex flex-col w-full max-w-md mx-auto">
  <h2 class="text-3xl font-bold text-gray-900 mb-8 text-center md:text-left">Actualiza tu contraseña</h2>
  
  <form class="flex flex-col space-y-6 w-full">
    <div class="flex flex-col">
      <label class="text-sm font-semibold text-gray-700 mb-2">Nueva contraseña</label>
      <input type="password" placeholder="Nueva contraseña" class="px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800" />
    </div>

    <div class="flex flex-col">
      <label class="text-sm font-semibold text-gray-700 mb-2">Verificar contraseña</label>
      <input type="password" placeholder="Verificar contraseña" class="px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800" />
    </div>

    <button type="button" class="w-full py-3 bg-green-900 text-white font-bold rounded-xl hover:bg-green-800 transition-colors shadow-md mt-2">
      Actualizar contraseña
    </button>
  </form>
</div>
