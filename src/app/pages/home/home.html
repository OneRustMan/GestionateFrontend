<div class="home-container">
  
  <section class="welcome-section">
    <h1>Bienvenido a Gestionate</h1>
    
    <div class="action-buttons">
      <button class="btn-primary" [routerLink]="primaryActionLink">{{ primaryActionLabel }}</button>
      <a class="link-secondary" [routerLink]="finalLinkRoute">{{ finalLinkLabel }}</a>
      <a *ngIf="isReceptionist" class="link-secondary" routerLink="/reportes-derivados">Reportes derivados</a>
    </div>
  </section>

  <section class="reports-section">
    <h2>{{ reportsTitle }}</h2>

    <div class="reports-content">
      <div class="reports-card">
        <div *ngIf="isLoading" class="loading-state">
          <p>Cargando reportes...</p>
        </div>

        <div *ngIf="errorMessage && !isLoading" class="error-state">
          <p>{{ errorMessage }}</p>
        </div>

        <div *ngIf="!isLoading && !errorMessage && recentReports.length === 0" class="no-reports">
          {{ emptyMessage }}
        </div>

        <ng-container *ngIf="!isLoading && !errorMessage && recentReports.length > 0">
          <ng-container *ngFor="let report of recentReports; let last = last">
            <div class="report-item">
              <h3>{{ getReportTitle(report) }}</h3>
              <p class="report-desc">{{ truncateDescription(report.description) }}</p>
              <p class="report-loc"><strong>Dirección:</strong> {{ report.location }}</p>
            </div>
            <hr *ngIf="!last" class="divider">
          </ng-container>
        </ng-container>

        <a class="link-all" [routerLink]="finalLinkRoute">
          {{ finalLinkLabel }}
          <span class="arrow">→</span>
        </a>
      </div>

      <div class="illustration-container">
        <img src="images/home-phone.svg" alt="Ilustración de reporte en móvil" />
      </div>
    </div>
  </section>

</div>
