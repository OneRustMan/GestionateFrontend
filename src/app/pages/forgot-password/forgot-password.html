<div class="flex flex-col w-full max-w-md mx-auto">
  <h2 class="text-3xl font-bold text-gray-900 mb-3 text-center md:text-left">Recuperar contraseña</h2>
  <p class="text-sm text-gray-600 mb-8 text-center md:text-left">
    Ingresa tu correo electrónico y te enviaremos un código temporal de recuperación.
  </p>
  
  <form #forgotPasswordForm="ngForm" class="flex flex-col space-y-6 w-full" (ngSubmit)="onSubmit(forgotPasswordForm)" novalidate>
    <div class="flex flex-col">
      <label class="text-sm font-semibold text-gray-700 mb-2">Correo electrónico</label>
      <input type="email" name="email" [(ngModel)]="email" #emailControl="ngModel" required email maxlength="120" [disabled]="isLoading()" placeholder="@correo.com" class="px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800" />
      <p *ngIf="emailControl.touched && emailControl.errors?.['required']" class="text-xs text-red-600 mt-1">El correo es obligatorio.</p>
      <p *ngIf="emailControl.touched && emailControl.errors?.['email']" class="text-xs text-red-600 mt-1">Ingresa un correo válido.</p>
    </div>

    <p *ngIf="successMessage()" class="text-sm text-green-700 font-medium">{{ successMessage() }}</p>
    <p *ngIf="errorMessage()" class="text-sm text-red-600 font-medium">{{ errorMessage() }}</p>

    <button type="submit" [disabled]="isLoading()" class="w-full py-3 bg-green-900 text-white font-bold rounded-xl hover:bg-green-800 transition-colors shadow-md mt-2 disabled:opacity-60 disabled:cursor-not-allowed">
      {{ isLoading() ? 'Enviando código...' : 'Enviar código' }}
    </button>

    <div class="text-center pt-4">
      <a routerLink="/login" class="font-bold text-gray-900 hover:text-green-800 transition-colors">Volver al inicio de sesión</a>
    </div>
  </form>
</div>
