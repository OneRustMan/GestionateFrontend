<div class="flex flex-col w-full">
  <h2 class="text-3xl font-bold text-gray-900 mb-8 text-center">Selecciona tu rol</h2>
  
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <!-- Rol Ciudadano -->
    <a routerLink="/registro/ciudadano" class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col items-center cursor-pointer">
      <div class="h-40 w-full mb-4 flex justify-center items-center">
        <img src="/images/rol-citizen.png" alt="Ciudadano" class="h-32 object-contain" />
      </div>
      <h3 class="text-lg font-bold text-gray-900">Ciudadano</h3>
    </a>

    <!-- Rol Recepcionista -->
    <a routerLink="/registro/recepcionista" class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col items-center cursor-pointer">
      <div class="h-40 w-full mb-4 flex justify-center items-center">
        <img src="/images/rol-receptionist.png" alt="Recepcionista" class="h-32 object-contain" />
      </div>
      <h3 class="text-lg font-bold text-gray-900 text-center">Recepcionista Municipal</h3>
    </a>

    <!-- Rol Operativo -->
    <a routerLink="/registro/operativo" class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col items-center cursor-pointer">
      <div class="h-40 w-full mb-4 flex justify-center items-center">
        <img src="/images/rol-operative.png" alt="Área operativa" class="h-32 object-contain" />
      </div>
      <h3 class="text-lg font-bold text-gray-900 text-center">Area operativa de limpieza</h3>
    </a>
  </div>
</div>
