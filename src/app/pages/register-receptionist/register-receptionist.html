<div class="flex flex-col w-full max-w-2xl mx-auto py-8">
  <h2 class="text-3xl font-bold text-gray-900 mb-8 text-center md:text-left">Crear cuenta de recepcionista municipal</h2>
  
  <form class="flex flex-col space-y-6 w-full">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-2">Nombres</label>
        <input type="text" placeholder="Nombres Completos" class="px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800" />
      </div>
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-2">Apellidos</label>
        <input type="text" placeholder="Apellidos Completos" class="px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800" />
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-2">DNI</label>
        <input type="text" placeholder="Numero de DNI" class="px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800" />
      </div>
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-2">Teléfono</label>
        <input type="tel" placeholder="Numero de 9 digitos" class="px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800" />
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-2">Correo electrónico</label>
        <input type="email" placeholder="@correo.com" class="px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800" />
      </div>
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-2">Distrito de la municipalidad</label>
        <select class="px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800 appearance-none cursor-pointer">
          <option value="" disabled selected>Seleccionar distrito</option>
          <option value="lima">Lima</option>
          <option value="ate">Ate</option>
          <option value="miraflores">Miraflores</option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-2">Unidad municipal</label>
        <input type="text" placeholder="Indicar al que pertenece" class="px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800" />
      </div>
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-2">Código de trabajador</label>
        <input type="text" placeholder="Codigo de identificacion" class="px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800" />
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-2">Contraseña</label>
        <input type="password" placeholder="Contraseña segura" class="px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800" />
      </div>
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-2">Verificar contraseña</label>
        <input type="password" placeholder="Contraseña segura" class="px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-shadow bg-gray-50 text-gray-800" />
      </div>
    </div>

    <button type="button" class="w-full py-3 bg-green-900 text-white font-bold rounded-xl hover:bg-green-800 transition-colors shadow-md mt-4">
      Registrarse
    </button>

    <div class="text-center pt-4">
      <span class="text-gray-600">¿Ya tienes cuenta?</span>
      <a routerLink="/login" class="font-bold text-gray-900 hover:text-green-800 ml-1 transition-colors">Inicia sesión aquí</a>
    </div>
  </form>
</div>
